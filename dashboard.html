<style>
* {
  box-sizing: border-box;

html, body {
    height: 100%;

body {

}

header

nav 
 {float: left;

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  }

nav ul 

 {list-style-type: none;
  padding: 0;}

article 
 {float: left;
  padding: 5px;
  width: 50%;
  background-color: #f1f1f1;
  min-height: 300px;}

section {
    height: calc(100vh - 80px - 120px);
}
  section::after {
  content: "";
  display: table;
  clear:both;  
}
nav, article {
    height: 100%
}
footer 
 {background-color: #759009;
  padding: 35px;
  text-align: center;
  color: white;}

header h2{
    margin: 0;
    text-align: left;
}
</style>
</head>
