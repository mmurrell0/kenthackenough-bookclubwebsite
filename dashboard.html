<style>
     @font-face {
      font-family: 'Erasaur';
      src: url('Erasaur.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
* {
  box-sizing: border-box;
}
html, body {
    height: 100%;
    margin: 0;
}
body {
  font-family: Arial, Helvetica, sans-serif;
  
  /* Background image */
  background-image: url("lv_0_20260329042051.jpg");
  
  /* Don't repeat, scale proportionally, cover screen */
  background-repeat: no-repeat;
  background-size: cover; 
  
  /* Position it so the dark part of the image lines up with the page brown */
  background-position: center -430px; /* adjust this value to move image up/down */
  
  /* Fallback color: matches your dark brown elsewhere */
  background-color: #8a5f3e;
  
  height: 100vh;
  margin: 0;
  margin-left: 0px;
}




nav 
 {float: left;
  width: 50%;
  min-height: 800px; 
  background-image: url("lv_0_20260329042959.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  
  }

nav ul 

 {list-style-type: none;
  padding: 30px;}

article 
 {float: left;
  padding: 5px;

 margin-bottom: 65px;
}

section {
    height: calc(100vh - 80px - 120px);

}

}
